name: sbom

on:
  workflow_call:
    inputs:
      target-path:
        description: 'Target path'
        required: false
        type: string
        default: '.'

jobs:
  sbom:
    name: sbom
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate
        uses: anchore/sbom-action@v0
        with:
          path: ${{ inputs.target-path }}
          format: 'spdx-json'
          output-file: 'yutila-sbom.spdx.json'

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: yutila-sbom
          path: yutila-sbom.spdx.json